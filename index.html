<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoConvertFast | High-End File Conversion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root { --brand-orange: #FF6723; --brand-blue: #1A2B47; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050810; color: white; }
        .white-nav { background: white; border-bottom: 1px solid #e2e8f0; }
        .tool-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; transition: 0.3s; cursor: pointer; }
        .tool-card:hover { transform: translateY(-8px); border-color: var(--brand-orange); background: rgba(255,103,35,0.05); }
        .cat-btn.active { background: var(--brand-orange); color: white; }
        .workspace-glass { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); border-radius: 32px; }
        #drop-zone.active { border-color: var(--brand-orange); background: rgba(255,103,35,0.1); }
    </style>
</head>
<body>

    <nav class="white-nav sticky top-0 z-50 py-4 px-8 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div onclick="location.reload()" class="flex items-center space-x-3 cursor-pointer">
                <img src="brand_logo.png" alt="GF Logo" class="w-10 h-10 object-contain">
                <span class="text-xl font-black italic text-[var(--brand-blue)] uppercase">Go<span class="text-[var(--brand-orange)]">Convert</span>Fast</span>
            </div>
            <div class="text-[10px] font-bold text-slate-400 tracking-widest uppercase hidden md:block">Graphics & Dev Ecosystem</div>
        </div>
    </nav>

    <main id="dashboard" class="container mx-auto px-6 py-16">
        <div class="text-center mb-16">
            <h1 class="text-6xl font-black italic mb-4">Master <span class="text-[var(--brand-orange)]">Every</span> File.</h1>
            <p class="text-slate-400 font-medium">Professional-grade AI tools for creators and developers.</p>
        </div>

        <div class="flex flex-wrap justify-center gap-3 mb-12">
            <button onclick="filterTools('All')" class="cat-btn active px-6 py-2 rounded-full text-xs font-bold border border-white/10 transition">All Tools</button>
            <button onclick="filterTools('Documents')" class="cat-btn px-6 py-2 rounded-full text-xs font-bold border border-white/10 transition">Documents</button>
            <button onclick="filterTools('Graphics')" class="cat-btn px-6 py-2 rounded-full text-xs font-bold border border-white/10 transition">Graphics</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="tool-grid"></div>
    </main>

    <section id="workspace" class="hidden container mx-auto px-6 py-12">
        <div class="max-w-5xl mx-auto workspace-glass p-10">
            <button onclick="closeWorkspace()" class="mb-8 text-slate-500 hover:text-white font-bold transition"><i class="fas fa-arrow-left mr-2"></i> Back</button>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                <div>
                    <h2 id="tool-title" class="text-4xl font-black italic mb-4 uppercase"></h2>
                    <p id="tool-info" class="text-slate-400 mb-10"></p>
                    
                    <div id="input-logic">
                        <div id="drop-zone" class="border-2 border-dashed border-white/10 rounded-3xl p-12 text-center hover:border-[var(--brand-orange)] transition cursor-pointer">
                            <i class="fas fa-cloud-upload-alt text-4xl mb-4 text-slate-600"></i>
                            <p class="text-sm font-bold text-slate-400">Click or Drag File Here</p>
                            <input type="file" id="fileInput" class="hidden">
                        </div>
                    </div>

                    <button id="process-btn" class="w-full mt-8 bg-[var(--brand-orange)] py-5 rounded-2xl font-black text-xl shadow-xl hover:brightness-110 transition uppercase">Convert & Export</button>
                </div>
                <div class="flex flex-col items-center justify-center">
                    <div id="preview-area" class="w-full aspect-square bg-black/40 rounded-3xl border border-white/5 flex items-center justify-center overflow-hidden">
                        <i class="fas fa-file-export text-6xl text-slate-800"></i>
                    </div>
                    <a id="download-link" class="hidden mt-6 w-full bg-white text-black py-4 rounded-xl font-bold text-center hover:bg-[var(--brand-orange)] hover:text-white transition">DOWNLOAD RESULT</a>
                </div>
            </div>
        </div>
    </section>

    <script>
        const { jsPDF } = window.jspdf;
        const tools = [
            { id: 'img-to-pdf', name: 'Image to PDF', desc: 'Convert JPG/PNG to high-quality PDF docs.', cat: 'Documents', icon: 'fa-file-pdf' },
            { id: 'pdf-to-word', name: 'PDF to Word', desc: 'Transform PDF data into editable text formats.', cat: 'Documents', icon: 'fa-file-word' },
            { id: 'qr-gen', name: 'QR Engine', desc: 'Branded QR codes for marketing assets.', cat: 'Graphics', icon: 'fa-qrcode' }
        ];

        function renderTools(list) {
            document.getElementById('tool-grid').innerHTML = list.map(t => `
                <div onclick="openTool('${t.id}')" class="tool-card p-8 group">
                    <div class="w-12 h-12 bg-white/5 rounded-xl flex items-center justify-center mb-6 group-hover:bg-[var(--brand-orange)] transition"><i class="fas ${t.icon} text-xl"></i></div>
                    <p class="text-[10px] font-bold text-[var(--brand-orange)] uppercase mb-2">${t.cat}</p>
                    <h3 class="text-xl font-extrabold italic">${t.name}</h3>
                </div>
            `).join('');
        }

        let activeFile = null;

        function openTool(id) {
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('workspace').classList.remove('hidden');
            const tool = tools.find(t => t.id === id);
            document.getElementById('tool-title').innerText = tool.name;
            document.getElementById('tool-info').innerText = tool.desc;
            
            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('fileInput');
            const preview = document.getElementById('preview-area');
            const dl = document.getElementById('download-link');

            dl.classList.add('hidden');
            preview.innerHTML = '<i class="fas fa-file-export text-6xl text-slate-800"></i>';

            dropZone.onclick = () => fileInput.click();
            fileInput.onchange = (e) => {
                activeFile = e.target.files[0];
                if (activeFile) {
                    preview.innerHTML = `<p class="text-sm font-bold text-[var(--brand-orange)] uppercase">${activeFile.name}</p>`;
                }
            };

            document.getElementById('process-btn').onclick = () => {
                if (!activeFile && id !== 'qr-gen') return alert("እባክህ ፋይል መጀመሪያ ምረጥ!");
                
                if (id === 'img-to-pdf') {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const doc = new jsPDF();
                        doc.addImage(e.target.result, 'JPEG', 10, 10, 180, 160);
                        const pdfBlob = doc.output('blob');
                        const url = URL.createObjectURL(pdfBlob);
                        dl.href = url;
                        dl.download = "GoConvertFast_Export.pdf";
                        dl.classList.remove('hidden');
                        preview.innerHTML = '<i class="fas fa-check-circle text-6xl text-green-500"></i><p class="mt-4 font-bold uppercase">PDF Ready!</p>';
                    };
                    reader.readAsDataURL(activeFile);
                } else {
                    alert("ይህ ቱል በቅርቡ ሙሉ በሙሉ ይሰራል። አሁን Image to PDF ይሞክሩ!");
                }
            };
        }

        function closeWorkspace() {
            document.getElementById('workspace').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        }

        function filterTools(cat) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderTools(cat === 'All' ? tools : tools.filter(t => t.cat === cat));
        }

        renderTools(tools);
    </script>
</body>
</html>
