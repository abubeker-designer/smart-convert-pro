<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoConvertFast | Premium Multi-Tool Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --bg-deep: #050810;
            --card-bg: rgba(255, 255, 255, 0.03);
            --brand-orange: #FF6723; /* From your logo */
            --brand-blue: #1A2B47;   /* From your logo */
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-deep);
            color: #ffffff;
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, #050810 80%);
        }

        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
        }

        .tool-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tool-card:hover {
            transform: translateY(-10px);
            border-color: var(--brand-orange);
            background: rgba(255, 103, 35, 0.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(255, 103, 35, 0.1);
        }

        .cat-active {
            background: var(--brand-orange) !important;
            color: white !important;
            box-shadow: 0 10px 20px rgba(255, 103, 35, 0.3);
        }

        .orange-glow {
            text-shadow: 0 0 15px rgba(255, 103, 35, 0.5);
        }

        #outputArea img { margin: 0 auto; border-radius: 12px; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="sticky top-0 z-50 bg-black/50 backdrop-blur-xl border-b border-white/5 py-4 px-8">
        <div class="container mx-auto flex justify-between items-center">
            <div onclick="location.reload()" class="flex items-center space-x-3 cursor-pointer">
                <img src="brand_logo.png" alt="GF Logo" class="w-10 h-10 object-contain">
                <span class="text-xl font-extrabold tracking-tighter uppercase italic">
                    GoConvert<span class="text-[var(--brand-orange)]">Fast</span>
                </span>
            </div>
            <button class="bg-white/5 hover:bg-white/10 px-6 py-2 rounded-full text-xs font-bold border border-white/10 transition">PRO ACCESS</button>
        </div>
    </nav>

    <main id="main-view" class="container mx-auto px-6 py-16">
        <div class="text-center mb-16">
            <h1 class="text-5xl md:text-7xl font-black mb-6 tracking-tight italic">Fastest <span class="text-[var(--brand-orange)] orange-glow">Tools</span> Hub</h1>
            <p class="text-slate-400 text-lg max-w-2xl mx-auto">Professional-grade conversion and design tools for high-end digital production.</p>
        </div>

        <div class="flex flex-wrap justify-center gap-3 mb-12" id="cat-filters">
            <button onclick="filterTools('All')" class="cat-btn cat-active px-6 py-2.5 rounded-full text-sm font-bold bg-white/5 border border-white/10 transition">All Tools</button>
            <button onclick="filterTools('Documents')" class="cat-btn px-6 py-2.5 rounded-full text-sm font-bold bg-white/5 border border-white/10 transition">Documents</button>
            <button onclick="filterTools('Graphics')" class="cat-btn px-6 py-2.5 rounded-full text-sm font-bold bg-white/5 border border-white/10 transition">Graphics</button>
            <button onclick="filterTools('Security')" class="cat-btn px-6 py-2.5 rounded-full text-sm font-bold bg-white/5 border border-white/10 transition">Security</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="tool-grid">
            </div>
    </main>

    <section id="workspace" class="hidden container mx-auto px-6 py-12">
        <div class="max-w-4xl mx-auto glass p-8 md:p-12 relative overflow-hidden">
            <button onclick="closeWorkspace()" class="mb-8 text-slate-400 hover:text-white flex items-center font-bold">
                <i class="fas fa-arrow-left mr-2"></i> Dashboard
            </button>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-start">
                <div>
                    <h2 id="tool-name" class="text-4xl font-black mb-4 italic uppercase tracking-tighter">Tool Name</h2>
                    <p id="tool-desc" class="text-slate-400 mb-8 font-medium"></p>
                    <div id="input-container" class="space-y-4"></div>
                    <button id="action-btn" class="w-full mt-8 bg-[var(--brand-orange)] py-4 rounded-xl font-black text-lg shadow-lg hover:shadow-orange-500/40 transition">EXECUTE NOW</button>
                </div>
                <div class="flex flex-col items-center">
                    <div id="outputArea" class="w-full min-h-[300px] bg-black/40 rounded-3xl border border-white/10 flex items-center justify-center p-6 text-center">
                        <i class="fas fa-bolt text-5xl text-slate-800"></i>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        const tools = [
            { id: 'qr', name: 'QR Matrix', desc: 'Create HD branding QR codes instantly.', cat: 'Marketing', icon: 'fa-qrcode' },
            { id: 'pass', name: 'SafeKey', desc: 'Generate 128-bit secure passwords.', cat: 'Security', icon: 'fa-shield-halved' },
            { id: 'pdf', name: 'PDF Pulse', desc: 'Extract text and data from PDF files.', cat: 'Documents', icon: 'fa-file-lines' },
            { id: 'img', name: 'Img Resizer', desc: 'Scale images without losing quality.', cat: 'Graphics', icon: 'fa-expand' },
            { id: 'json', name: 'Code Formatter', desc: 'Beautify and validate JSON/HTML code.', cat: 'Graphics', icon: 'fa-code' }
        ];

        function renderTools(list) {
            const grid = document.getElementById('tool-grid');
            grid.innerHTML = list.map(t => `
                <div onclick="openTool('${t.id}')" class="tool-card glass p-8 cursor-pointer group">
                    <div class="w-12 h-12 bg-white/5 rounded-xl flex items-center justify-center mb-6 group-hover:bg-[var(--brand-orange)] transition">
                        <i class="fas ${t.icon} text-xl"></i>
                    </div>
                    <p class="text-[10px] font-bold text-[var(--brand-orange)] uppercase tracking-widest mb-2">${t.cat}</p>
                    <h3 class="text-xl font-extrabold mb-1">${t.name}</h3>
                </div>
            `).join('');
        }

        function filterTools(category) {
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('cat-active'));
            event.target.classList.add('cat-active');
            
            const filtered = category === 'All' ? tools : tools.filter(t => t.cat === category);
            renderTools(filtered);
        }

        function openTool(id) {
            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('workspace').classList.remove('hidden');
            const tool = tools.find(t => t.id === id);
            document.getElementById('tool-name').innerText = tool.name;
            document.getElementById('tool-desc').innerText = tool.desc;
            
            const inputs = document.getElementById('input-container');
            const output = document.getElementById('outputArea');
            output.innerHTML = '<i class="fas fa-bolt text-5xl text-slate-800"></i>';

            if(id === 'qr') {
                inputs.innerHTML = `<input type="text" id="qrIn" placeholder="Enter link..." class="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-white outline-none focus:border-[var(--brand-orange)]">`;
                document.getElementById('action-btn').onclick = () => {
                    output.innerHTML = '<div id="finalQR" class="p-4 bg-white rounded-xl"></div>';
                    new QRCode(document.getElementById('finalQR'), { text: document.getElementById('qrIn').value, width: 200, height: 200 });
                }
            } else if(id === 'pass') {
                inputs.innerHTML = `<p class="text-sm text-slate-400">Security Strength: High</p>`;
                document.getElementById('action-btn').onclick = () => {
                    const pass = Math.random().toString(36).slice(-10).toUpperCase();
                    output.innerHTML = `<div class="text-3xl font-mono font-bold text-[var(--brand-orange)]">${pass}</div>`;
                }
            }
        }

        function closeWorkspace() {
            document.getElementById('main-view').classList.remove('hidden');
            document.getElementById('workspace').classList.add('hidden');
        }

        renderTools(tools);
    </script>
</body>
</html>
