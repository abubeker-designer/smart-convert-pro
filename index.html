<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoConvertFast | Professional Digital Ecosystem</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'], outfit: ['Outfit', 'sans-serif'] },
                    colors: { brand: { orange: '#FF6723', blue: '#1A2B47', dark: '#05070A', studio: '#0F1115' } }
                }
            }
        }
    </script>

    <style>
        body { background: #05070A; color: #fff; }
        .studio-card { 
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 40px; 
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .studio-card:hover { 
            transform: translateY(-15px); 
            border-color: #FF6723; 
            background: rgba(255, 103, 35, 0.05);
            box-shadow: 0 40px 80px -20px rgba(0,0,0,0.8);
        }
        .nav-blur { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
        .hero-gradient { background: linear-gradient(135deg, #fff 30%, #475569 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Custom Loader */
        .loader-ring { border: 3px solid rgba(255,103,35,0.1); border-top: 3px solid #FF6723; border-radius: 50%; width: 45px; height: 45px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Studio Themes */
        .yt-theme { background: linear-gradient(to bottom right, #1a0000, #05070a); }
        .gfx-theme { background: linear-gradient(to bottom right, #001a1a, #05070a); }
        .doc-theme { background: linear-gradient(to bottom right, #1a1a00, #05070a); }
    </style>
</head>
<body class="antialiased">

    <nav class="nav-blur sticky top-0 z-50 py-5 px-10 flex justify-between items-center shadow-sm">
        <div class="flex items-center space-x-4 cursor-pointer" onclick="location.reload()">
            <img src="brand_logo.png" alt="GF" class="w-11 h-11">
            <div class="flex flex-col">
                <span class="text-2xl font-black italic text-brand-blue tracking-tighter uppercase leading-none">GO<span class="text-brand-orange">CONVERT</span>FAST</span>
                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-[0.4em]">Professional Ecosystem</span>
            </div>
        </div>
        <div class="hidden md:flex space-x-8 text-[11px] font-black text-brand-blue uppercase tracking-widest">
            <a href="#studios" class="hover:text-brand-orange transition">Studios</a>
            <a href="#" class="hover:text-brand-orange transition">Enterprise</a>
            <a href="#" class="bg-brand-orange text-white px-5 py-2 rounded-full shadow-lg hover:brightness-110 transition">Go Pro</a>
        </div>
    </nav>

    <header class="container mx-auto px-6 pt-32 pb-20 text-center">
        <h1 class="hero-gradient text-6xl md:text-9xl font-black font-outfit tracking-tighter leading-none mb-8">
            The Digital <br> <span class="text-brand-orange italic">Studio Hub.</span>
        </h1>
        <p class="text-slate-400 text-lg md:text-xl font-medium max-w-2xl mx-auto leading-relaxed">
            High-performance tools for Graphics, Documents, and SEO. <br> Built for 100% security and lightning speed.
        </p>
    </header>

    <main id="studios" class="container mx-auto px-6 pb-40">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10" id="hubGrid">
            </div>
    </main>

    <section id="studioOverlay" class="hidden fixed inset-0 z-[60] bg-brand-dark overflow-y-auto">
        <div class="container mx-auto px-6 py-12">
            <div class="flex justify-between items-center mb-16">
                <button onclick="exitStudio()" class="group flex items-center font-black text-slate-500 hover:text-white transition uppercase text-xs tracking-widest">
                    <i class="fas fa-arrow-left-long mr-3 group-hover:-translate-x-2 transition"></i> Close Studio
                </button>
                <div id="studioBadge" class="px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase tracking-widest text-brand-orange"></div>
            </div>

            <div id="studioContainer" class="grid grid-cols-1 lg:grid-cols-2 gap-20 items-start">
                </div>
        </div>
    </section>

    <footer class="py-20 border-t border-white/5 text-center">
        <p class="text-[10px] font-black text-slate-700 uppercase tracking-[0.8em] italic">Abu Sira Designs • GoConvertFast.com • 2026</p>
    </footer>

    <script>
        const { jsPDF } = window.jspdf;

        // STUDIO DEFINITIONS
        const studios = [
            { 
                id: 'gfx', 
                name: 'Graphics Pro Studio', 
                desc: 'Advanced image conversion and scaling engine.', 
                icon: 'fa-palette', 
                color: '#00F2FF',
                theme: 'gfx-theme',
                tools: ['Image to PDF', 'Image Compressor', 'QR Pro Designer']
            },
            { 
                id: 'yt', 
                name: 'YouTube Growth Studio', 
                desc: 'AI-powered metadata and SEO optimization.', 
                icon: 'fa-brands fa-youtube', 
                color: '#FF0000',
                theme: 'yt-theme',
                tools: ['Viral Tag Generator', 'Description Architect', 'Title Optimizer']
            },
            { 
                id: 'sec', 
                name: 'Security Vault Studio', 
                desc: 'Military-grade encryption and password generation.', 
                icon: 'fa-shield-halved', 
                color: '#00FF85',
                theme: 'sec-theme',
                tools: ['PassVault Generate', 'Secret Key Hash']
            }
        ];

        function renderHub() {
            const grid = document.getElementById('hubGrid');
            grid.innerHTML = studios.map(s => `
                <div onclick="enterStudio('${s.id}')" class="studio-card p-12 group cursor-pointer relative overflow-hidden">
                    <div class="w-16 h-16 rounded-2xl flex items-center justify-center mb-8 bg-white/5 group-hover:bg-white/10 transition duration-500 group-hover:scale-110">
                        <i class="fas ${s.icon} text-3xl" style="color: ${s.color}"></i>
                    </div>
                    <h3 class="text-3xl font-black italic mb-4 uppercase tracking-tighter group-hover:text-brand-orange transition">${s.name}</h3>
                    <p class="text-slate-500 font-medium leading-relaxed mb-8">${s.desc}</p>
                    <div class="flex flex-wrap gap-2">
                        ${s.tools.map(t => `<span class="px-3 py-1 bg-white/5 rounded-full text-[9px] font-bold uppercase tracking-widest text-slate-400">${t}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        let activeStudio = null;
        let selectedFile = null;

        function enterStudio(id) {
            activeStudio = studios.find(x => x.id === id);
            const overlay = document.getElementById('studioOverlay');
            const container = document.getElementById('studioContainer');
            const badge = document.getElementById('studioBadge');

            overlay.classList.remove('hidden');
            overlay.className = `fixed inset-0 z-[60] overflow-y-auto ${activeStudio.theme}`;
            badge.innerText = activeStudio.name;

            container.innerHTML = `
                <div class="space-y-10">
                    <h2 class="text-7xl md:text-9xl font-black italic tracking-tighter uppercase leading-none" style="color: ${activeStudio.color}">${id}_STUDIO</h2>
                    <p class="text-xl text-slate-400 font-medium leading-relaxed max-w-xl">${activeStudio.desc}</p>
                    
                    <div class="bg-white/5 p-10 md:p-16 rounded-[50px] border border-white/10 backdrop-blur-3xl">
                        <div id="dropZone" class="border-2 border-dashed border-white/10 rounded-[32px] p-16 text-center hover:border-white transition cursor-pointer">
                            <i class="fas fa-cloud-arrow-up text-5xl mb-6 text-slate-700"></i>
                            <p class="text-lg font-bold text-slate-400 uppercase tracking-widest">Upload Master File</p>
                            <input type="file" id="fileInput" class="hidden">
                        </div>
                        <div id="textInputArea" class="hidden mt-6">
                            <textarea id="mainText" rows="5" class="w-full bg-white/5 border border-white/10 rounded-2xl p-6 text-white outline-none focus:border-white transition" placeholder="Enter keywords or links..."></textarea>
                        </div>
                        <button id="engineBtn" class="w-full mt-10 py-6 rounded-3xl font-black text-2xl uppercase tracking-tighter shadow-2xl transition-all" style="background: ${activeStudio.color}; color: ${id === 'gfx' ? '#000' : '#fff'}">Run Studio Engine</button>
                    </div>
                </div>
                
                <div class="flex flex-col items-center">
                    <div id="outputMonitor" class="w-full aspect-square bg-black/60 rounded-[60px] border border-white/5 flex flex-col items-center justify-center p-10 text-center">
                        <i class="fas ${activeStudio.icon} text-9xl text-slate-900 mb-8"></i>
                        <p class="text-slate-700 font-black uppercase tracking-[0.5em] text-[10px] italic">Studio System Standby</p>
                    </div>
                    <div id="loading" class="hidden mt-8 flex flex-col items-center space-y-4">
                        <div class="loader-ring"></div>
                        <p class="text-brand-orange font-black text-[10px] uppercase tracking-widest animate-pulse">Processing via Engine...</p>
                    </div>
                    <a id="dlBtn" class="hidden mt-10 w-full bg-white text-black py-6 rounded-3xl font-black text-center text-xl uppercase tracking-tighter hover:brightness-90 transition">Download Master Result</a>
                </div>
            `;

            // Logic Adjustment per Studio
            const dz = document.getElementById('dropZone');
            const ti = document.getElementById('textInputArea');
            if(id === 'yt' || id === 'sec') { dz.classList.add('hidden'); ti.classList.remove('hidden'); }

            dz.onclick = () => document.getElementById('fileInput').click();
            document.getElementById('fileInput').onchange = (e) => {
                selectedFile = e.target.files[0];
                const monitor = document.getElementById('outputMonitor');
                if(selectedFile && selectedFile.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (ev) => monitor.innerHTML = `<img src="${ev.target.result}" class="max-w-full max-h-full rounded-3xl shadow-2xl border border-white/10">`;
                    reader.readAsDataURL(selectedFile);
                } else {
                    monitor.innerHTML = `<i class="fas fa-file-pdf text-8xl text-brand-orange"></i><p class="mt-4 font-bold">${selectedFile.name}</p>`;
                }
            };

            document.getElementById('engineBtn').onclick = () => runEngine(id);
        }

        async function runEngine(id) {
            const monitor = document.getElementById('outputMonitor');
            const loader = document.getElementById('loading');
            const dl = document.getElementById('dlBtn');
            
            loader.classList.remove('hidden');
            dl.classList.add('hidden');

            // Actual Logic Processing
            setTimeout(() => {
                loader.classList.add('hidden');
                
                if(id === 'gfx') {
                    if(!selectedFile) return alert("Please select a file!");
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const doc = new jsPDF();
                        doc.addImage(e.target.result, 'JPEG', 10, 10, 190, 150);
                        dl.href = URL.createObjectURL(doc.output('blob'));
                        dl.download = "GoConvertFast_Export.pdf";
                        dl.classList.remove('hidden');
                        monitor.innerHTML = `<i class="fas fa-circle-check text-9xl text-green-500"></i><p class="mt-6 font-black uppercase text-xl">Conversion Perfect!</p>`;
                    };
                    reader.readAsDataURL(selectedFile);
                } else if(id === 'yt') {
                    const val = document.getElementById('mainText').value || "Viral Trends";
                    const tags = val.split(' ').map(t => `#${t}`).join(', ') + ", #Trending, #AbuSira";
                    monitor.innerHTML = `<div class="p-8 bg-white/5 rounded-3xl text-left w-full h-full overflow-y-auto"><p class="text-brand-orange font-black mb-4 uppercase text-[10px]">SEO Tags Generated:</p><p class="text-white font-medium leading-relaxed">${tags}</p></div>`;
                    const b = new Blob([tags], {type: 'text/plain'});
                    dl.href = URL.createObjectURL(b); dl.download = "YT_SEO_Result.txt"; dl.classList.remove('hidden');
                } else if(id === 'sec') {
                    const p = Math.random().toString(36).slice(-12).toUpperCase() + "_!SEC";
                    monitor.innerHTML = `<h1 class="text-5xl font-black text-brand-orange font-mono tracking-widest">${p}</h1>`;
                    const b = new Blob([p], {type: 'text/plain'});
                    dl.href = URL.createObjectURL(b); dl.download = "SecretKey.txt"; dl.classList.remove('hidden');
                }
            }, 2500);
        }

        function exitStudio() {
            document.getElementById('studioOverlay').classList.add('hidden');
            selectedFile = null;
        }

        renderHub();
    </script>
</body>
</html>
