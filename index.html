<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoConvertFast | AI Content Engine</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'], outfit: ['Outfit', 'sans-serif'] },
                    colors: { brand: { orange: '#FF6723', dark: '#05070A', panel: '#0F1115', border: '#1E222C' } }
                }
            }
        }
    </script>

    <style>
        body { background: #05070A; color: #E2E8F0; overflow: hidden; }
        .sidebar-scroll::-webkit-scrollbar { width: 4px; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: #1E222C; border-radius: 10px; }
        
        .tool-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid transparent; }
        .tool-btn:hover { background: rgba(255, 103, 35, 0.08); border-color: rgba(255, 103, 35, 0.2); color: #FF6723; }
        .tool-btn.active { background: #FF6723; color: #fff; box-shadow: 0 10px 20px -5px rgba(255, 103, 35, 0.4); }

        .glass-blur { background: rgba(15, 17, 21, 0.85); backdrop-filter: blur(25px); border-right: 1px solid #1E222C; }
        .workspace-bg { background-image: radial-gradient(circle at 2px 2px, #1E222C 1px, transparent 0); background-size: 40px 40px; }
        
        .console-text { font-family: 'Courier New', Courier, monospace; }
        @keyframes blink { 50% { opacity: 0; } }
        .cursor-blink { animation: blink 1s step-end infinite; }
    </style>
</head>
<body class="font-sans">

    <div class="flex h-screen overflow-hidden">
        
        <aside class="w-80 glass-blur flex flex-col z-20">
            <div class="p-8 border-b border-brand-border">
                <div class="flex items-center space-x-4">
                    <img src="brand_logo.png" alt="Logo" class="w-12 h-12 object-contain rounded-xl shadow-lg">
                    <div class="flex flex-col">
                        <span class="text-2xl font-black font-outfit tracking-tighter leading-none">GO<span class="text-brand-orange text-3xl">.</span></span>
                        <span class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em]">ConvertFast</span>
                    </div>
                </div>
            </div>

            <div class="px-6 py-4">
                <div class="relative">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-600 text-xs"></i>
                    <input type="text" id="toolSearch" onkeyup="filterTools()" placeholder="Search 200+ tools..." 
                        class="w-full bg-brand-dark/50 border border-brand-border rounded-xl py-3 pl-10 pr-4 text-xs font-semibold focus:outline-none focus:border-brand-orange transition">
                </div>
            </div>

            <nav id="toolRegistryList" class="flex-1 overflow-y-auto px-4 py-2 sidebar-scroll space-y-1">
                </nav>

            <div class="p-6 border-t border-brand-border bg-brand-dark/30">
                <div class="flex items-center justify-between text-[10px] font-black uppercase tracking-widest text-slate-600">
                    <span>Server: Active</span>
                    <span class="text-brand-orange">v3.0 Enterprise</span>
                </div>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto workspace-bg relative">
            
            <div class="w-full h-20 bg-brand-panel/50 border-b border-brand-border flex items-center justify-center">
                <span class="text-[10px] font-bold text-slate-700 uppercase tracking-[1em]">[ AdSense Header Unit ]</span>
            </div>

            <div id="activeWorkspace" class="max-w-5xl mx-auto p-12 mt-10">
                <div class="text-center py-20 space-y-8">
                    <div class="relative inline-block">
                        <div class="absolute inset-0 bg-brand-orange blur-3xl opacity-10"></div>
                        <i class="fas fa-bolt text-8xl text-brand-orange/20 relative z-10"></i>
                    </div>
                    <h1 class="text-6xl font-black font-outfit tracking-tighter uppercase leading-none">
                        Unified <br><span class="text-brand-orange italic">AI Agent</span>
                    </h1>
                    <p class="text-slate-500 max-w-md mx-auto font-medium text-lg leading-relaxed">
                        Select a specialized tool from the registry to initialize the autonomous processing engine.
                    </p>
                </div>
            </div>
        </main>

        <aside class="w-80 bg-brand-panel border-l border-brand-border p-8 flex flex-col space-y-10 z-20">
            <div class="aspect-[3/4] rounded-3xl bg-brand-dark border border-brand-border flex items-center justify-center text-center p-6">
                <span class="text-[10px] font-bold text-slate-800 uppercase tracking-[0.5em] leading-loose">Vertical AdSense Slot<br>High CPC Zone</span>
            </div>

            <div class="space-y-6">
                <h4 class="text-xs font-black uppercase tracking-widest text-brand-orange">System Logic</h4>
                <div id="toolMeta" class="text-sm text-slate-400 leading-relaxed font-medium italic">
                    Agent is currently polling for tasks...
                </div>
            </div>
        </aside>

    </div>

    <script>
        /* 1. EXTENDED TOOL REGISTRY (Scale to 200+) */
        const toolRegistry = [
            { id: "yt-dl", name: "YouTube Pro 4K", cat: "Video", icon: "fa-youtube", desc: "Enterprise-grade YouTube asset extraction with multi-threaded streaming." },
            { id: "tk-dl", name: "TikTok No-Watermark", cat: "Social", icon: "fa-tiktok", desc: "Removes metadata and watermarks from TikTok videos for clean repurposing." },
            { id: "pdf-img", name: "PDF to Ultra-HD", cat: "Docs", icon: "fa-file-pdf", desc: "Converts vector-based PDF pages into pixel-perfect JPEG/PNG assets." },
            { id: "img-opt", name: "AI Image Optimizer", cat: "Graphics", icon: "fa-wand-magic-sparkles", desc: "Reduces file size by up to 90% while using AI to maintain sharpness." },
            { id: "mp3-gen", name: "Audio Extractor", cat: "Audio", icon: "fa-music", desc: "Lossless extraction of audio streams from any video format." }
        ];

        /* 2. CORE RENDERER */
        function loadRegistry() {
            const list = document.getElementById('toolRegistryList');
            list.innerHTML = toolRegistry.map(tool => `
                <div onclick="initTool('${tool.id}')" class="tool-btn p-4 flex items-center space-x-4 rounded-xl cursor-pointer font-bold text-sm text-slate-400 group">
                    <div class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center group-hover:bg-brand-orange/10 transition">
                        <i class="fab ${tool.icon} text-lg"></i>
                    </div>
                    <span>${tool.name}</span>
                </div>
            `).join('');
        }

        /* 3. WORKSPACE LOADER */
        function initTool(id) {
            const tool = toolRegistry.find(t => t.id === id);
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');

            document.getElementById('toolMeta').innerText = tool.desc;

            const workspace = document.getElementById('activeWorkspace');
            workspace.innerHTML = `
                <div class="space-y-12 animate-in slide-in-from-bottom-4 duration-500">
                    <div class="flex items-center justify-between">
                        <div class="space-y-2">
                            <h2 class="text-5xl font-black font-outfit uppercase tracking-tighter italic">${tool.name}</h2>
                            <p class="text-brand-orange text-[10px] font-black uppercase tracking-[0.4em]">Autonomous Module: Active</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 gap-8">
                        <div class="bg-brand-panel p-10 rounded-[40px] border border-brand-border space-y-8 shadow-2xl">
                            <div class="space-y-4">
                                <label class="text-[10px] font-black uppercase tracking-widest text-slate-500 ml-4">Universal Input</label>
                                <input type="text" id="targetUrl" placeholder="Paste URL or drag files here..." 
                                    class="w-full bg-brand-dark border border-brand-border rounded-2xl py-6 px-8 text-lg font-bold focus:outline-none focus:border-brand-orange transition shadow-inner">
                            </div>

                            <button onclick="executeAgent('${tool.id}')" id="agentBtn" class="w-full bg-brand-orange py-8 rounded-[30px] font-extrabold text-2xl uppercase tracking-tighter shadow-2xl hover:brightness-110 active:scale-95 transition-all flex items-center justify-center space-x-6">
                                <span>Analyze & Execute</span>
                                <i class="fas fa-circle-nodes"></i>
                            </button>
                        </div>

                        <div id="agentConsole" class="hidden bg-black/80 rounded-3xl p-8 border border-brand-border console-text text-[11px] text-green-500 space-y-2 shadow-2xl">
                            <div class="flex items-center space-x-3 mb-4 pb-4 border-b border-white/5">
                                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                                <span class="uppercase tracking-widest font-black text-green-600">AI Agent Terminal</span>
                            </div>
                            <div id="logStream"></div>
                        </div>
                    </div>
                </div>
            `;
        }

        /* 4. AGENT EXECUTION LOGIC */
        function executeAgent(toolId) {
            const btn = document.getElementById('agentBtn');
            const consoleBox = document.getElementById('agentConsole');
            const stream = document.getElementById('logStream');
            
            consoleBox.classList.remove('hidden');
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner animate-spin"></i> <span>Processing Assets...</span>`;

            const logs = [
                `> Initialization: System core v3.0 booting...`,
                `> Target: ${toolId} localized.`,
                `> Fetching remote binary streams...`,
                `> Bypass: Security handshakes successful.`,
                `> Encoding: Professional-grade output formatting...`,
                `> Success: Asset export ready for download.`
            ];

            let i = 0;
            const timer = setInterval(() => {
                if (i < logs.length) {
                    const p = document.createElement('p');
                    p.innerText = logs[i];
                    stream.appendChild(p);
                    i++;
                } else {
                    clearInterval(timer);
                    btn.style.background = "#22C55E";
                    btn.innerHTML = `<span>Export Assets Now</span> <i class="fas fa-download"></i>`;
                    btn.disabled = false;
                }
            }, 800);
        }

        function filterTools() {
            const query = document.getElementById('toolSearch').value.toLowerCase();
            const btns = document.querySelectorAll('.tool-btn');
            btns.forEach(btn => {
                const text = btn.innerText.toLowerCase();
                btn.style.display = text.includes(query) ? 'flex' : 'none';
            });
        }

        window.onload = loadRegistry;
    </script>
</body>
</html>
