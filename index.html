<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-neutral-950 text-white">

<div class="flex h-screen">

  <!-- Sidebar -->
  <aside class="w-64 bg-neutral-900 p-4">
    <h1 class="text-xl font-bold mb-6">Tools</h1>
    <button onclick="setTool('image')" class="block mb-2">Image Compressor</button>
    <button onclick="setTool('pdf')" class="block mb-2">PDF Tool</button>
  </aside>

  <!-- Main -->
  <main class="flex-1 p-6">
    <h1 id="title" class="text-2xl mb-4">Tool</h1>

    <input type="file" id="fileInput" class="mb-3">
    <input type="text" id="urlInput" placeholder="Paste URL..." class="w-full p-2 bg-neutral-800 mb-3">

    <button onclick="runTool()" class="bg-white text-black px-4 py-2 rounded">
      Run
    </button>

    <pre id="result" class="mt-4"></pre>
  </main>

</div>

<script>
let currentTool = "image";

function setTool(tool) {
  currentTool = tool;
  document.getElementById("title").innerText = tool;
}

function detectInput(input) {
  if (typeof input === "string" && input.startsWith("http")) return "url";
  return "file";
}

async function runTool() {
  const file = document.getElementById("fileInput").files[0];
  const url = document.getElementById("urlInput").value;

  const input = file || url;

  if (!input) {
    alert("No input");
    return;
  }

  const type = detectInput(input);

  let result;

  if (currentTool === "image" && type === "file") {
    result = await compressImage(input);
  } else if (currentTool === "pdf") {
    result = "PDF processing requires backend";
  } else {
    result = "Unsupported";
  }

  document.getElementById("result").innerText =
    JSON.stringify(result, null, 2);
}

async function compressImage(file) {
  const bitmap = await createImageBitmap(file);

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = bitmap.width;
  canvas.height = bitmap.height;

  ctx.drawImage(bitmap, 0, 0);

  return new Promise(resolve => {
    canvas.toBlob(blob => {
      resolve({
        size: blob.size
      });
    }, "image/jpeg", 0.7);
  });
}
</script>

</body>
</html>
