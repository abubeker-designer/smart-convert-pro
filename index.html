<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoConvertFast | Fast, Secure & Professional Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --bg-deep: #050810;
            --brand-orange: #FF6723;
            --brand-blue: #1A2B47;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-deep);
            color: #ffffff;
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, #050810 80%);
        }

        /* ነጭ ሄደር ሎጎው በደንብ እንዲታይ */
        .white-header {
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
        }

        .tool-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            transition: all 0.3s ease;
        }

        .tool-card:hover {
            transform: translateY(-8px);
            border-color: var(--brand-orange);
            background: rgba(255, 103, 35, 0.05);
        }

        .cat-btn.active {
            background: var(--brand-orange);
            color: white;
            border-color: var(--brand-orange);
        }

        .workspace-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
        }
    </style>
</head>
<body class="min-h-screen">

    <nav class="white-header sticky top-0 z-50 py-4 px-8 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <div onclick="location.reload()" class="flex items-center space-x-3 cursor-pointer">
                <img src="brand_logo.png" alt="GF Logo" class="w-10 h-10 object-contain">
                <span class="text-xl font-black italic text-[var(--brand-blue)]">
                    GO<span class="text-[var(--brand-orange)]">CONVERT</span>FAST
                </span>
            </div>
            <div class="hidden md:block text-[10px] font-bold text-slate-400 tracking-widest uppercase">
                Premium Digital Toolkit
            </div>
        </div>
    </nav>

    <main id="dashboard" class="container mx-auto px-6 py-16">
        <div class="text-center mb-16">
            <h1 class="text-5xl md:text-7xl font-extrabold mb-6 italic tracking-tighter">
                Smart <span class="text-[var(--brand-orange)]">Tools.</span> Fast <span class="text-[var(--brand-orange)]">Results.</span>
            </h1>
            <p class="text-slate-400 text-lg max-w-2xl mx-auto font-medium">Professional-grade utilities for graphics, documents, and secure production.</p>
        </div>

        <div class="flex flex-wrap justify-center gap-3 mb-12" id="filters">
            <button onclick="filterTools('All')" class="cat-btn active px-6 py-2.5 rounded-full text-xs font-bold border border-white/10 bg-white/5 transition">All Tools</button>
            <button onclick="filterTools('Documents')" class="cat-btn px-6 py-2.5 rounded-full text-xs font-bold border border-white/10 bg-white/5 transition">Documents</button>
            <button onclick="filterTools('Graphics')" class="cat-btn px-6 py-2.5 rounded-full text-xs font-bold border border-white/10 bg-white/5 transition">Graphics</button>
            <button onclick="filterTools('Security')" class="cat-btn px-6 py-2.5 rounded-full text-xs font-bold border border-white/10 bg-white/5 transition">Security</button>
            <button onclick="filterTools('Dev Tools')" class="cat-btn px-6 py-2.5 rounded-full text-xs font-bold border border-white/10 bg-white/5 transition">Dev Tools</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="tool-grid">
            </div>
    </main>

    <section id="workspace" class="hidden container mx-auto px-6 py-12">
        <div class="max-w-5xl mx-auto workspace-box p-8 md:p-12">
            <button onclick="closeWorkspace()" class="mb-8 text-slate-400 hover:text-white flex items-center font-bold transition">
                <i class="fas fa-chevron-left mr-2"></i> Dashboard
            </button>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                <div>
                    <h2 id="t-name" class="text-4xl font-black mb-4 italic uppercase">Tool Name</h2>
                    <p id="t-desc" class="text-slate-400 mb-8 font-medium"></p>
                    <div id="t-inputs" class="space-y-4"></div>
                    <button id="t-action" class="w-full mt-8 bg-[var(--brand-orange)] py-4 rounded-xl font-black text-lg shadow-lg hover:brightness-110 transition">CONVERT NOW</button>
                </div>
                <div class="flex flex-col items-center">
                    <div id="t-output" class="w-full aspect-square bg-black/40 rounded-3xl border border-white/5 flex items-center justify-center p-6 shadow-inner">
                        <i class="fas fa-bolt text-5xl text-slate-800"></i>
                    </div>
                    <button id="t-download" class="hidden mt-6 w-full bg-white text-black py-4 rounded-xl font-bold hover:bg-[var(--brand-orange)] hover:text-white transition shadow-xl">
                        <i class="fas fa-download mr-2"></i> DOWNLOAD FILE
                    </button>
                </div>
            </div>
        </div>
    </section>

    <script>
        // የቱሎች ዝርዝር (እንዳይጠፋ በጥንቃቄ የተቀመጠ)
        const allTools = [
            { id: 'qr', name: 'QR Matrix', desc: 'Generate high-resolution branding QR codes.', cat: 'Marketing', icon: 'fa-qrcode' },
            { id: 'pass', name: 'SafeKey Pro', desc: 'Secure 128-bit algorithmic password generator.', cat: 'Security', icon: 'fa-shield-halved' },
            { id: 'pdf-text', name: 'PDF to Text', desc: 'Extract clean text from any PDF document.', cat: 'Documents', icon: 'fa-file-lines' },
            { id: 'img-res', name: 'Image Resize', desc: 'Professional image scaling and compression.', cat: 'Graphics', icon: 'fa-expand' },
            { id: 'json-fmt', name: 'JSON Flow', desc: 'Validate and beautify JSON/Code structures.', cat: 'Dev Tools', icon: 'fa-code' },
            { id: 'unit', name: 'Unit Convert', desc: 'Precision calculation for all global units.', cat: 'Dev Tools', icon: 'fa-calculator' }
        ];

        function render(list) {
            const grid = document.getElementById('tool-grid');
            grid.innerHTML = list.map(t => `
                <div onclick="openTool('${t.id}')" class="tool-card p-8 cursor-pointer group">
                    <div class="w-12 h-12 bg-white/5 rounded-xl flex items-center justify-center mb-6 group-hover:bg-[var(--brand-orange)] transition">
                        <i class="fas ${t.icon} text-xl"></i>
                    </div>
                    <p class="text-[10px] font-bold text-[var(--brand-orange)] uppercase mb-2 tracking-widest">${t.cat}</p>
                    <h3 class="text-xl font-extrabold italic">${t.name}</h3>
                </div>
            `).join('');
        }

        function filterTools(cat) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            render(cat === 'All' ? allTools : allTools.filter(t => t.cat === cat));
        }

        function openTool(id) {
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('workspace').classList.remove('hidden');
            const t = allTools.find(x => x.id === id);
            document.getElementById('t-name').innerText = t.name;
            document.getElementById('t-desc').innerText = t.desc;
            
            const inputs = document.getElementById('t-inputs');
            const output = document.getElementById('t-output');
            const dl = document.getElementById('t-download');
            dl.classList.add('hidden');

            if(id === 'qr') {
                inputs.innerHTML = `<input type="text" id="qrInput" placeholder="Enter link or text..." class="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-white outline-none focus:border-[var(--brand-orange)]">`;
                document.getElementById('t-action').onclick = () => {
                    output.innerHTML = '<div id="finalQR" class="p-4 bg-white rounded-xl"></div>';
                    new QRCode(document.getElementById('finalQR'), { text: document.getElementById('qrInput').value, width: 200, height: 200 });
                    dl.classList.remove('hidden');
                    dl.onclick = () => {
                        html2canvas(document.getElementById('finalQR')).then(canvas => {
                            const a = document.createElement('a');
                            a.download = 'GoConvertFast_QR.png';
                            a.href = canvas.toDataURL();
                            a.click();
                        });
                    };
                };
            } else if(id === 'pass') {
                inputs.innerHTML = `<div class="p-6 bg-white/5 rounded-xl text-center text-2xl font-mono" id="passView">********</div>`;
                document.getElementById('t-action').onclick = () => {
                    const p = Math.random().toString(36).slice(-10).toUpperCase() + "!";
                    document.getElementById('passView').innerText = p;
                    output.innerHTML = `<span class="text-3xl font-mono font-bold text-[var(--brand-orange)]">${p}</span>`;
                    dl.classList.remove('hidden');
                    dl.onclick = () => {
                        const blob = new Blob([p], {type: 'text/plain'});
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url; a.download = 'password.txt'; a.click();
                    };
                };
            }
        }

        function closeWorkspace() {
            document.getElementById('workspace').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        }

        render(allTools);
    </script>
</body>
</html>
