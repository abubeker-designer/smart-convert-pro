<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartConvert Pro | 3D Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0f172a; /* Dark Elegant Background */
            color: #ffffff;
            overflow-x: hidden;
        }

        /* 3D Premium Card */
        .card-3d {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .card-3d:hover {
            transform: translateY(-12px) scale(1.03);
            background: rgba(51, 65, 85, 0.9);
            border-color: #6366f1;
            box-shadow: 0 25px 50px -12px rgba(99, 102, 241, 0.3);
        }

        .glass-nav {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .gradient-text {
            background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.6);
            transform: translateY(-2px);
        }

        #outputArea img {
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* 3D Floating Animation */
        .float { animation: floating 3s ease-in-out infinite; }
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body class="min-h-screen">

    <nav class="glass-nav sticky top-0 z-50 py-5 px-8">
        <div class="container mx-auto flex justify-between items-center">
            <div onclick="window.location.reload()" class="flex items-center space-x-3 cursor-pointer">
                <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center float">
                    <i class="fas fa-cube text-white"></i>
                </div>
                <span class="text-xl font-extrabold tracking-tighter uppercase">Smart<span class="text-indigo-500">Hub</span></span>
            </div>
            <div class="hidden md:flex space-x-8 text-sm font-bold uppercase tracking-widest text-slate-400">
                <a href="#" class="hover:text-white transition">Tools</a>
                <a href="#" class="hover:text-white transition">AI Studio</a>
            </div>
            <button class="btn-primary px-6 py-2 rounded-xl font-bold text-sm shadow-lg">ABU SIRA PRO</button>
        </div>
    </nav>

    <header class="container mx-auto px-6 py-24 text-center" id="hero">
        <h1 class="text-6xl md:text-8xl font-black mb-6 tracking-tighter leading-none">
            3D <span class="gradient-text">Design</span> Tools
        </h1>
        <p class="text-xl text-slate-400 max-w-2xl mx-auto font-medium">
            Professional high-end utilities for the modern digital developer.
        </p>
    </header>

    <main class="container mx-auto px-6 pb-24" id="tool-grid-view">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8" id="toolsContainer">
            </div>
    </main>

    <section id="workspace" class="hidden container mx-auto px-6 py-12">
        <div class="max-w-5xl mx-auto card-3d p-10 md:p-16 border border-white/10 relative overflow-hidden">
            <button onclick="closeWorkspace()" class="mb-8 text-indigo-400 font-bold flex items-center hover:text-white transition">
                <i class="fas fa-arrow-left mr-2"></i> Dashboard
            </button>
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
                <div>
                    <h2 id="activeToolTitle" class="text-4xl font-extrabold mb-4 italic">Tool Name</h2>
                    <p id="activeToolDesc" class="text-slate-400 mb-8 font-medium"></p>
                    <div id="inputSpace" class="space-y-6"></div>
                    <button id="actionBtn" class="btn-primary w-full mt-8 py-5 rounded-2xl font-black text-lg uppercase tracking-widest shadow-2xl">
                        Generate Now
                    </button>
                </div>
                <div class="flex flex-col items-center">
                    <div id="outputArea" class="w-full min-h-[300px] bg-slate-900/50 rounded-3xl border-2 border-dashed border-white/10 flex items-center justify-center p-6">
                        <i class="fas fa-wand-magic-sparkles text-7xl text-slate-800 float"></i>
                    </div>
                    <button id="downloadBtn" class="hidden mt-6 w-full bg-white text-slate-900 py-4 rounded-xl font-bold hover:bg-indigo-500 hover:text-white transition">
                        <i class="fas fa-download mr-2"></i> DOWNLOAD FILE
                    </button>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-16 text-center border-t border-white/5">
        <p class="text-[10px] font-black tracking-[0.4em] text-slate-600 uppercase italic">© 2026 Abu Sira Designs | Next-Gen Toolset</p>
    </footer>

    <script>
        const tools = [
            { id: 'qr', name: '3D QR Maker', desc: 'Create HD branding QR codes.', icon: 'fa-qrcode' },
            { id: 'pass', name: 'Secure Key', desc: 'Generate encrypted 3D passwords.', icon: 'fa-shield-halved' },
            { id: 'img', name: 'Image Master', desc: 'Advanced graphics processing.', icon: 'fa-image' },
            { id: 'doc', name: 'Doc AI', desc: 'Smart document conversion.', icon: 'fa-file-code' }
        ];

        function init() {
            const container = document.getElementById('toolsContainer');
            container.innerHTML = tools.map(t => `
                <div onclick="openTool('${t.id}')" class="card-3d p-10 flex flex-col items-start group">
                    <div class="w-14 h-14 bg-indigo-600/20 rounded-xl flex items-center justify-center mb-6 group-hover:bg-indigo-600 transition-all duration-300">
                        <i class="fas ${t.icon} text-2xl text-indigo-400 group-hover:text-white"></i>
                    </div>
                    <h3 class="text-xl font-bold mb-2 tracking-tight">${t.name}</h3>
                    <p class="text-sm text-slate-500 font-medium">${t.desc}</p>
                </div>
            `).join('');
        }

        function openTool(id) {
            document.getElementById('hero').classList.add('hidden');
            document.getElementById('tool-grid-view').classList.add('hidden');
            document.getElementById('workspace').classList.remove('hidden');
            
            const tool = tools.find(x => x.id === id);
            document.getElementById('activeToolTitle').innerText = tool.name;
            document.getElementById('activeToolDesc').innerText = tool.desc;

            const inputArea = document.getElementById('inputSpace');
            const output = document.getElementById('outputArea');
            const dl = document.getElementById('downloadBtn');
            dl.classList.add('hidden');

            if(id === 'qr') {
                inputArea.innerHTML = `<input type="text" id="qrText" placeholder="https://example.com" class="w-full p-5 bg-slate-800 border border-white/10 rounded-xl text-white outline-none focus:border-indigo-500">`;
                document.getElementById('actionBtn').onclick = () => {
                    output.innerHTML = '<div id="qrRes" class="bg-white p-3 rounded-xl shadow-2xl"></div>';
                    new QRCode(document.getElementById('qrRes'), { text: document.getElementById('qrText').value, width: 200, height: 200 });
                    dl.classList.remove('hidden');
                    dl.onclick = () => {
                        const canvas = document.querySelector('#qrRes canvas');
                        const link = document.createElement('a');
                        link.download = 'QR_AbuSira.png';
                        link.href = canvas.toDataURL();
                        link.click();
                    };
                };
            }
        }

        function closeWorkspace() {
            document.getElementById('hero').classList.remove('hidden');
            document.getElementById('tool-grid-view').classList.remove('hidden');
            document.getElementById('workspace').classList.add('hidden');
        }

        init();
    </script>
</body>
</html>
