<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoConvertFast | Unified AI Studio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'], outfit: ['Outfit', 'sans-serif'] },
                    colors: { brand: { orange: '#FF6723', dark: '#05070A', panel: '#0F1115' } }
                }
            }
        }
    </script>

    <style>
        body { background: #05070A; color: #fff; overflow: hidden; }
        .sidebar-item { transition: 0.3s; border-radius: 12px; cursor: pointer; }
        .sidebar-item:hover { background: rgba(255, 103, 35, 0.1); color: #FF6723; }
        .sidebar-item.active { background: #FF6723; color: #fff; }
        .glass-panel { background: rgba(15, 17, 21, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .ad-placeholder { background: repeating-linear-gradient(45deg, #0F1115, #0F1115 10px, #15181F 10px, #15181F 20px); border: 1px dashed rgba(255,255,255,0.1); }
    </style>
</head>
<body class="font-sans">

    <div class="flex h-screen overflow-hidden">
        
        <aside class="w-72 glass-panel p-6 flex flex-col border-r border-white/5">
            <div class="mb-10 flex items-center space-x-3">
                <div class="w-8 h-8 bg-brand-orange rounded-lg"></div>
                <h1 class="text-xl font-black font-outfit tracking-tighter uppercase">GO<span class="text-brand-orange">STUDIO</span></h1>
            </div>

            <nav id="toolList" class="flex-1 space-y-2 overflow-y-auto pr-2">
                </nav>

            <div class="mt-auto pt-6 border-t border-white/5 text-[10px] font-bold text-slate-600 uppercase tracking-widest italic">
                Enterprise v2.0
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-10 relative">
            <div id="workspace" class="max-w-4xl mx-auto mt-20">
                <div class="text-center space-y-6">
                    <i class="fas fa-microchip text-6xl text-brand-orange/20 animate-pulse"></i>
                    <h2 class="text-4xl font-black font-outfit uppercase">Select a Tool to <span class="text-brand-orange">Initialize Agent</span></h2>
                    <p class="text-slate-500 max-w-lg mx-auto">Choose an instrument from the registry to begin high-performance processing.</p>
                </div>
            </div>
        </main>

        <aside class="w-80 glass-panel p-6 border-l border-white/5 space-y-8">
            <div class="ad-placeholder h-64 rounded-2xl flex items-center justify-center text-[10px] font-black uppercase text-slate-700 tracking-[0.4em] text-center p-4">
                AdSense Display Unit
            </div>

            <div class="space-y-4">
                <h3 class="text-xs font-black uppercase tracking-widest text-brand-orange italic">System Insights</h3>
                <div id="toolInfo" class="text-sm text-slate-400 leading-relaxed italic">
                    The Unified AI Agent is currently in standby mode. Select a tool to see technical specifications.
                </div>
            </div>

            <div class="ad-placeholder h-40 rounded-2xl flex items-center justify-center text-[10px] font-black uppercase text-slate-700 tracking-[0.4em]">
                Sidebar Ad
            </div>
        </aside>
    </div>

    <script>
        /* 1. TOOL REGISTRY */
        const toolRegistry = [
            { id: "yt-dl", name: "YouTube Downloader", cat: "Video", icon: "fa-youtube", desc: "Extract high-bitrate video streams directly from YouTube servers." },
            { id: "tk-dl", name: "TikTok Downloader", cat: "Video", icon: "fa-tiktok", desc: "No-watermark TikTok video retrieval in original HD quality." },
            { id: "pdf-img", name: "PDF to Image", cat: "Document", icon: "fa-file-pdf", desc: "Convert multi-page PDF documents into professional JPEG assets." },
            { id: "img-comp", name: "Image Compressor", cat: "Graphics", icon: "fa-file-image", desc: "Smart-scaling compression to reduce file size without losing visual fidelity." }
        ];

        /* 2. UNIFIED AGENT ENGINE */
        async function unifiedAgent(input, toolId) {
            console.log(`Agent Triggered: Processing ${toolId}...`);
            
            // Simulation of back-end processing
            return new Promise((resolve) => {
                setTimeout(() => {
                    resolve({
                        status: "Success",
                        timestamp: new Date().toISOString(),
                        tool_used: toolId,
                        result_url: "#",
                        message: "Asset processed by Enterprise Engine"
                    });
                }, 2000);
            });
        }

        /* 3. UI RENDERER */
        function initApp() {
            const list = document.getElementById('toolList');
            toolRegistry.forEach(tool => {
                const item = document.createElement('div');
                item.className = "sidebar-item p-4 flex items-center space-x-4 font-bold text-sm text-slate-400 mb-1";
                item.innerHTML = `<i class="fab ${tool.icon} w-5"></i> <span>${tool.name}</span>`;
                item.onclick = () => loadTool(tool);
                list.appendChild(item);
            });
        }

        function loadTool(tool) {
            // Update UI State
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            document.getElementById('toolInfo').innerText = tool.desc;

            const workspace = document.getElementById('workspace');
            workspace.innerHTML = `
                <div class="space-y-10 animate-in fade-in duration-500">
                    <div class="flex items-center space-x-6">
                        <div class="w-16 h-16 bg-brand-orange/10 rounded-2xl flex items-center justify-center text-brand-orange text-3xl">
                            <i class="fab ${tool.icon}"></i>
                        </div>
                        <div>
                            <h1 class="text-5xl font-black font-outfit uppercase tracking-tighter">${tool.name}</h1>
                            <p class="text-brand-orange text-xs font-bold uppercase tracking-widest italic">${tool.cat} Module Activated</p>
                        </div>
                    </div>

                    <div class="bg-brand-panel p-10 rounded-[32px] border border-white/5 space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <input type="text" id="urlInput" placeholder="Paste link here..." class="w-full bg-black/50 border border-white/10 rounded-2xl p-5 outline-none focus:border-brand-orange transition text-white">
                            <input type="file" id="fileInput" class="w-full bg-black/50 border border-white/10 rounded-2xl p-5 outline-none focus:border-brand-orange transition text-slate-500 text-sm">
                        </div>
                        
                        <button onclick="runProcess('${tool.id}')" id="actionBtn" class="w-full bg-brand-orange py-6 rounded-2xl font-black text-xl uppercase tracking-tighter shadow-xl hover:brightness-110 transition active:scale-95 flex items-center justify-center space-x-4">
                            <span>Execute Agent</span>
                            <i class="fas fa-bolt"></i>
                        </button>
                    </div>

                    <div id="outputMonitor" class="hidden bg-black rounded-[32px] p-8 border border-white/5 font-mono text-xs text-green-500 overflow-x-auto shadow-inner">
                        <div class="flex items-center space-x-3 mb-4">
                            <div class="w-2 h-2 bg-green-500 rounded-full animate-ping"></div>
                            <span class="uppercase tracking-widest font-black">Agent Output Console</span>
                        </div>
                        <pre id="consoleOutput"></pre>
                    </div>
                </div>
            `;
        }

        async function runProcess(toolId) {
            const btn = document.getElementById('actionBtn');
            const monitor = document.getElementById('outputMonitor');
            const consoleOut = document.getElementById('consoleOutput');
            const url = document.getElementById('urlInput').value;
            const file = document.getElementById('fileInput').files[0];

            if (!url && !file) return alert("Please provide input data!");

            // UI State: Loading
            btn.innerHTML = `<i class="fas fa-circle-notch animate-spin"></i> <span>Processing...</span>`;
            btn.disabled = true;
            monitor.classList.remove('hidden');
            consoleOut.innerText = `> Initializing ${toolId} Engine...\n> Connection established...\n> Fetching remote assets...`;

            try {
                const result = await unifiedAgent(url || file, toolId);
                consoleOut.innerText += `\n> Task completed in 241ms\n> ${JSON.stringify(result, null, 2)}`;
                btn.innerHTML = `<span>Export Ready</span> <i class="fas fa-check"></i>`;
                btn.style.background = "#22c55e";
            } catch (err) {
                consoleOut.innerText += `\n> ERROR: System Failure...`;
                btn.style.background = "#ef4444";
            }
        }

        // Initialize on load
        window.onload = initApp;
    </script>
</body>
</html>
