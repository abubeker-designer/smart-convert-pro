<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartConvert Pro | Advanced Tools Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --primary: #0061ff;
            --secondary: #60efff;
            --surface: #ffffff;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: #1e293b;
            scroll-behavior: smooth;
        }

        /* Professional Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            border-color: var(--primary);
        }

        .gradient-text {
            background: linear-gradient(135deg, #0061ff 0%, #60efff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-link {
            transition: all 0.2s;
            border-radius: 12px;
        }

        .sidebar-link:hover {
            background: rgba(0, 97, 255, 0.05);
            color: var(--primary);
        }

        .page-transition {
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Search Bar Glow */
        .search-focus:focus-within {
            box-shadow: 0 0 0 4px rgba(0, 97, 255, 0.1);
            border-color: var(--primary);
        }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="hidden lg:flex flex-col w-72 bg-white border-r border-slate-100 p-6 sticky top-0 h-screen">
        <div class="flex items-center space-x-3 mb-12">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                <i class="fas fa-bolt"></i>
            </div>
            <span class="text-xl font-extrabold tracking-tighter">Smart<span class="text-blue-600">Convert</span></span>
        </div>

        <nav class="space-y-2 flex-1">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Main Menu</p>
            <a href="#" onclick="showSection('home')" class="sidebar-link flex items-center space-x-3 p-3 text-slate-600 font-semibold active bg-blue-50 text-blue-600">
                <i class="fas fa-th-large w-5"></i> <span>Dashboard</span>
            </a>
            <a href="#" class="sidebar-link flex items-center space-x-3 p-3 text-slate-600 font-semibold">
                <i class="fas fa-file-pdf w-5"></i> <span>PDF Tools</span>
            </a>
            <a href="#" class="sidebar-link flex items-center space-x-3 p-3 text-slate-600 font-semibold">
                <i class="fas fa-image w-5"></i> <span>Image Studio</span>
            </a>
            <a href="#" class="sidebar-link flex items-center space-x-3 p-3 text-slate-600 font-semibold">
                <i class="fas fa-shield-alt w-5"></i> <span>Security</span>
            </a>
        </nav>

        <div class="mt-auto p-4 bg-slate-900 rounded-2xl text-white">
            <p class="text-xs font-bold opacity-60 mb-2">Abu Sira Pro</p>
            <p class="text-[10px] leading-relaxed">Upgrade to access API & Batch processing.</p>
        </div>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="bg-white/80 backdrop-blur-md sticky top-0 z-40 py-4 px-8 border-b border-slate-50 flex justify-between items-center">
            <div class="search-focus flex items-center bg-slate-100 px-4 py-2.5 rounded-2xl w-full max-w-md border border-transparent transition-all">
                <i class="fas fa-search text-slate-400 mr-3"></i>
                <input type="text" id="toolSearch" onkeyup="searchTools()" placeholder="Search from 200+ tools..." class="bg-transparent outline-none text-sm w-full font-medium">
            </div>
            <div class="flex items-center space-x-4 ml-4">
                <button class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 hover:bg-slate-200 transition"><i class="fas fa-bell"></i></button>
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-600 to-cyan-400 border-2 border-white shadow-md"></div>
            </div>
        </header>

        <section id="home-section" class="p-8 lg:p-12 page-transition">
            <div class="mb-12">
                <h1 class="text-4xl lg:text-5xl font-extrabold tracking-tight mb-4">Welcome back, <span class="gradient-text">Abu Sira</span></h1>
                <p class="text-slate-500 font-medium text-lg">Your professional toolkit is ready. What are we building today?</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6" id="toolGrid">
                </div>
        </section>

        <section id="workspace-section" class="hidden p-8 lg:p-12 page-transition">
            <div class="max-w-4xl mx-auto">
                <button onclick="showSection('home')" class="mb-8 flex items-center text-blue-600 font-bold hover:translate-x-[-5px] transition-all"><i class="fas fa-arrow-left mr-2"></i> Back to Dashboard</button>
                <div class="bg-white rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden">
                    <div class="p-8 lg:p-12 grid grid-cols-1 lg:grid-cols-2 gap-12">
                        <div id="tool-ui-area">
                            <h2 id="activeToolName" class="text-4xl font-black mb-4 tracking-tight">QR Generator</h2>
                            <p id="activeToolDesc" class="text-slate-400 mb-8 font-medium">Create high-quality QR codes in seconds.</p>
                            <div id="dynamicInputs" class="space-y-6"></div>
                            <button id="actionBtn" class="mt-8 w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl shadow-blue-100 hover:bg-blue-700 transition-all">PROCESS NOW</button>
                        </div>
                        <div class="bg-slate-50 rounded-[2rem] p-8 flex flex-col items-center justify-center border-2 border-dashed border-slate-200 min-h-[400px]">
                            <p class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-300 mb-6">Live Output Preview</p>
                            <div id="outputArea" class="w-full flex justify-center">
                                <i class="fas fa-wand-magic-sparkles text-6xl text-slate-100"></i>
                            </div>
                            <button id="downloadBtn" class="hidden mt-8 w-full bg-emerald-500 text-white py-4 rounded-xl font-bold shadow-lg shadow-emerald-100"><i class="fas fa-download mr-2"></i> DOWNLOAD RESULT</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const tools = [
            { id: 'qr', name: 'QR Code Pro', icon: 'fa-qrcode', color: 'text-indigo-600', category: 'Security' },
            { id: 'pdf', name: 'PDF to Text', icon: 'fa-file-pdf', color: 'text-red-500', category: 'Documents' },
            { id: 'pass', name: 'SafePass Gen', icon: 'fa-key', color: 'text-emerald-500', category: 'Security' },
            { id: 'word', name: 'Word Count', icon: 'fa-font', color: 'text-blue-500', category: 'Writing' },
            { id: 'img', name: 'Image Resize', icon: 'fa-expand', color: 'text-orange-500', category: 'Graphics' },
            { id: 'json', name: 'JSON Format', icon: 'fa-code', color: 'text-slate-600', category: 'Dev' },
            { id: 'lorem', name: 'Lorem Ipsum', icon: 'fa-paragraph', category: 'Writing' }
        ];

        function initGrid() {
            const grid = document.getElementById('toolGrid');
            grid.innerHTML = tools.map(t => `
                <div onclick="openTool('${t.id}')" class="glass-card p-8 rounded-[2rem] cursor-pointer group">
                    <div class="w-14 h-14 bg-white shadow-sm rounded-2xl flex items-center justify-center mb-6 group-hover:bg-blue-600 group-hover:text-white transition-all duration-300">
                        <i class="fas ${t.icon} text-2xl"></i>
                    </div>
                    <p class="text-[10px] font-black uppercase tracking-widest text-blue-500 mb-2">${t.category || 'General'}</p>
                    <h3 class="text-xl font-extrabold tracking-tight">${t.name}</h3>
                </div>
            `).join('');
        }

        function showSection(id) {
            document.getElementById('home-section').classList.toggle('hidden', id !== 'home');
            document.getElementById('workspace-section').classList.toggle('hidden', id !== 'workspace');
        }

        function openTool(id) {
            showSection('workspace');
            const tool = tools.find(t => t.id === id);
            document.getElementById('activeToolName').innerText = tool.name;
            const inputArea = document.getElementById('dynamicInputs');
            const output = document.getElementById('outputArea');
            const dlBtn = document.getElementById('downloadBtn');
            dlBtn.classList.add('hidden');

            if(id === 'qr') {
                inputArea.innerHTML = `<input type="text" id="qrIn" placeholder="Enter URL or Text..." class="w-full p-6 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-blue-500 text-lg font-medium transition-all">`;
                document.getElementById('actionBtn').onclick = () => {
                    output.innerHTML = '<div id="qrFinal" class="bg-white p-4 rounded-xl shadow-lg border"></div>';
                    new QRCode(document.getElementById('qrFinal'), { text: document.getElementById('qrIn').value, width: 200, height: 200 });
                    dlBtn.classList.remove('hidden');
                };
            }
        }

        initGrid();
    </script>
</body>
</html>
