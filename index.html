<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoConvertFast | Enterprise AI Studio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'], outfit: ['Outfit', 'sans-serif'] },
                    colors: { brand: { orange: '#FF6723', dark: '#05070A', panel: '#0F1115', border: '#1E222C' } }
                }
            }
        }
    </script>

    <style>
        body { background: #05070A; color: #E2E8F0; overflow: hidden; }
        .sidebar-scroll::-webkit-scrollbar { width: 4px; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: #1E222C; border-radius: 10px; }
        .tool-btn { transition: all 0.3s; border: 1px solid transparent; }
        .tool-btn:hover { background: rgba(255, 103, 35, 0.08); border-color: rgba(255, 103, 35, 0.2); color: #FF6723; }
        .tool-btn.active { background: #FF6723; color: #fff; box-shadow: 0 10px 20px -5px rgba(255, 103, 35, 0.4); }
        .glass-blur { background: rgba(15, 17, 21, 0.85); backdrop-filter: blur(25px); border-right: 1px solid #1E222C; }
        .console-text { font-family: 'Courier New', Courier, monospace; }
    </style>
</head>
<body class="font-sans">

    <div class="flex h-screen overflow-hidden">
        
        <aside class="w-80 glass-blur flex flex-col z-20">
            <div class="p-8 border-b border-brand-border">
                <div class="flex items-center space-x-4">
                    <div class="w-10 h-10 bg-brand-orange rounded-xl flex items-center justify-center shadow-lg shadow-brand-orange/20">
                        <i class="fas fa-bolt text-white text-xl"></i>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-2xl font-black font-outfit tracking-tighter leading-none uppercase">GO<span class="text-brand-orange">.</span></span>
                        <span class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.3em]">ConvertFast</span>
                    </div>
                </div>
            </div>

            <nav id="toolRegistryList" class="flex-1 overflow-y-auto px-4 py-6 sidebar-scroll space-y-2">
                </nav>

            <div class="p-6 border-t border-brand-border bg-brand-dark/30">
                <div class="flex items-center justify-between text-[10px] font-black uppercase tracking-widest text-slate-600">
                    <span>Engine: v3.0</span>
                    <span class="text-green-500">● Online</span>
                </div>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto bg-[radial-gradient(#1E222C_1px,transparent_0)] [background-size:40px_40px] relative">
            
            <div class="w-full h-24 bg-brand-panel/50 border-b border-brand-border flex items-center justify-center">
                <span class="text-[10px] font-bold text-slate-800 uppercase tracking-[1em]">Leaderboard Ad Unit</span>
            </div>

            <div id="activeWorkspace" class="max-w-4xl mx-auto p-12 mt-10">
                <div class="text-center py-20 space-y-8">
                    <h1 class="text-7xl font-black font-outfit tracking-tighter uppercase leading-none">
                        Unified <br><span class="text-brand-orange italic">AI Studio</span>
                    </h1>
                    <p class="text-slate-500 max-w-md mx-auto font-medium text-lg leading-relaxed">
                        Select a specialized tool from the registry to initialize the autonomous processing engine.
                    </p>
                </div>
            </div>
        </main>

        <aside class="w-80 bg-brand-panel border-l border-brand-border p-8 flex flex-col space-y-10 z-20">
            <div class="aspect-[3/4] rounded-3xl bg-brand-dark border border-brand-border flex items-center justify-center text-center p-6">
                <span class="text-[10px] font-bold text-slate-800 uppercase tracking-[0.5em] leading-loose">Vertical Ad Slot</span>
            </div>
            <div class="space-y-4">
                <h4 class="text-xs font-black uppercase tracking-widest text-brand-orange">System Meta</h4>
                <div id="toolMeta" class="text-xs text-slate-500 leading-relaxed font-medium italic">
                    Waiting for agent instruction...
                </div>
            </div>
        </aside>

    </div>

    <script>
        const tools = [
            { id: "yt", name: "YouTube 4K Downloader", icon: "fa-youtube", desc: "Extract high-bitrate video streams directly from YouTube." },
            { id: "tk", name: "TikTok No-Watermark", icon: "fa-tiktok", desc: "Retrieves clean TikTok assets for repurposing." },
            { id: "pdf", name: "PDF to High-Res Image", icon: "fa-file-pdf", desc: "Convert PDF documents to professional JPEG/PNG assets." },
            { id: "img", name: "AI Image Optimizer", icon: "fa-wand-magic-sparkles", desc: "Reduce file size without losing visual quality." }
        ];

        function initApp() {
            const list = document.getElementById('toolRegistryList');
            list.innerHTML = tools.map(tool => `
                <div onclick="loadTool('${tool.id}')" class="tool-btn p-4 flex items-center space-x-4 rounded-xl cursor-pointer font-bold text-sm text-slate-400">
                    <i class="fab ${tool.icon} text-lg w-6"></i>
                    <span>${tool.name}</span>
                </div>
            `).join('');
        }

        function loadTool(id) {
            const tool = tools.find(t => t.id === id);
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById('toolMeta').innerText = tool.desc;

            document.getElementById('activeWorkspace').innerHTML = `
                <div class="space-y-10 animate-in slide-in-from-bottom-4 duration-500">
                    <h2 class="text-5xl font-black font-outfit uppercase tracking-tighter italic">${tool.name}</h2>
                    <div class="bg-brand-panel p-10 rounded-[40px] border border-brand-border space-y-8 shadow-2xl">
                        <input type="text" id="targetUrl" placeholder="Paste link or instruction here..." 
                            class="w-full bg-brand-dark border border-brand-border rounded-2xl py-6 px-8 text-lg font-bold outline-none focus:border-brand-orange transition">
                        <button onclick="runAgent('${tool.id}')" id="runBtn" class="w-full bg-brand-orange py-8 rounded-[30px] font-extrabold text-2xl uppercase tracking-tighter shadow-2xl hover:brightness-110 active:scale-95 transition-all">
                            Initialize Agent
                        </button>
                    </div>
                    <div id="console" class="hidden bg-black rounded-3xl p-8 border border-brand-border console-text text-[11px] text-green-500 space-y-2">
                        <div class="flex items-center space-x-3 mb-4 pb-2 border-b border-white/5">
                            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                            <span class="uppercase tracking-widest font-black">AI Agent Terminal</span>
                        </div>
                        <div id="logs"></div>
                    </div>
                </div>
            `;
        }

        function runAgent(id) {
            const btn = document.getElementById('runBtn');
            const con = document.getElementById('console');
            const logs = document.getElementById('logs');
            const url = document.getElementById('targetUrl').value;

            if(!url) return alert("Please enter a valid link!");

            con.classList.remove('hidden');
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner animate-spin"></i> Processing...`;

            const steps = [
                `> Booting ${id} Engine...`,
                `> Handshake with remote server successful.`,
                `> Extracting binary streams...`,
                `> AI analysis complete. High-quality export ready.`
            ];

            let i = 0;
            const interval = setInterval(() => {
                if(i < steps.length) {
                    const p = document.createElement('p');
                    p.innerText = steps[i];
                    logs.appendChild(p);
                    i++;
                } else {
                    clearInterval(interval);
                    btn.style.background = "#22C55E";
                    btn.innerHTML = `<span>Download Assets</span> <i class="fas fa-download"></i>`;
                    btn.disabled = false;
                }
            }, 800);
        }

        window.onload = initApp;
    </script>
</body>
</html>
