<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoConvertFast | Studio Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'], outfit: ['Outfit', 'sans-serif'] },
                    colors: { brand: { orange: '#FF6723', blue: '#1A2B47', dark: '#0A0C10' } }
                }
            }
        }
    </script>

    <style>
        body { background: #0A0C10; color: #fff; overflow-x: hidden; }
        .studio-card { 
            background: linear-gradient(145deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 40px;
            transition: all 0.4s ease;
        }
        .studio-card:hover { transform: scale(1.03); border-color: #FF6723; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        
        /* Studio Specific Themes */
        .theme-youtube { border-left: 5px solid #FF0000; }
        .theme-graphics { border-left: 5px solid #00F2FF; }
        .theme-security { border-left: 5px solid #00FF85; }
        .theme-docs { border-left: 5px solid #FFD600; }

        .btn-premium {
            background: linear-gradient(90deg, #FF6723 0%, #FF8E53 100%);
            box-shadow: 0 15px 30px rgba(255, 103, 35, 0.2);
        }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 bg-white py-4 px-10 flex justify-between items-center shadow-md">
        <div class="flex items-center space-x-3 cursor-pointer" onclick="location.reload()">
            <img src="brand_logo.png" alt="GF" class="w-10 h-10">
            <span class="text-2xl font-black italic text-brand-blue tracking-tighter uppercase">Go<span class="text-brand-orange">Convert</span>Fast</span>
        </div>
        <div class="flex space-x-6 text-brand-blue font-bold text-sm uppercase tracking-widest">
            <a href="#" class="hover:text-brand-orange">Studios</a>
            <a href="#" class="hover:text-brand-orange">API</a>
            <a href="#" class="hover:text-brand-orange">Pro</a>
        </div>
    </nav>

    <main id="hub" class="container mx-auto px-6 py-20">
        <div class="text-center mb-20">
            <h1 class="text-6xl md:text-8xl font-black font-outfit mb-6 tracking-tighter">Choose Your <span class="text-brand-orange italic">Studio.</span></h1>
            <p class="text-slate-500 font-medium text-xl">High-end digital tools for professional workflows.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10" id="studioGrid">
            </div>
    </main>

    <section id="studioWorkspace" class="hidden fixed inset-0 z-[60] bg-brand-dark overflow-y-auto">
        <div class="container mx-auto px-6 py-10">
            <button onclick="closeStudio()" class="mb-10 text-slate-400 hover:text-white font-black flex items-center uppercase tracking-widest text-xs">
                <i class="fas fa-arrow-left mr-3"></i> Back to Hub
            </button>

            <div id="studioContent" class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-start">
                </div>
        </div>
    </section>

    <script>
        const { jsPDF } = window.jspdf;

        const studios = [
            { id: 'yt', name: 'YouTube Creator Studio', icon: 'fa-brands fa-youtube', theme: 'theme-youtube', color: '#FF0000', desc: 'Optimize your channel with AI-driven SEO tags.' },
            { id: 'gfx', name: 'Graphics Pro Studio', icon: 'fa-palette', theme: 'theme-graphics', color: '#00F2FF', desc: 'Premium image conversion and processing tools.' },
            { id: 'sec', name: 'Security Vault Studio', icon: 'fa-shield-halved', theme: 'theme-security', color: '#00FF85', desc: 'Encrypted password and secure data generation.' },
            { id: 'doc', name: 'Document Master Studio', icon: 'fa-file-pdf', theme: 'theme-docs', color: '#FFD600', desc: 'Smart PDF creation and document management.' }
        ];

        function renderHub() {
            const grid = document.getElementById('studioGrid');
            grid.innerHTML = studios.map(s => `
                <div onclick="openStudio('${s.id}')" class="studio-card p-12 cursor-pointer group ${s.theme}">
                    <div class="w-16 h-16 rounded-2xl flex items-center justify-center mb-8 bg-white/5 group-hover:bg-white/10 transition">
                        <i class="fas ${s.icon} text-3xl" style="color: ${s.color}"></i>
                    </div>
                    <h3 class="text-3xl font-black italic mb-4 uppercase tracking-tighter">${s.name}</h3>
                    <p class="text-slate-500 font-medium leading-relaxed">${s.desc}</p>
                </div>
            `).join('');
        }

        function openStudio(id) {
            const studio = studios.find(x => x.id === id);
            const container = document.getElementById('studioContent');
            document.getElementById('studioWorkspace').classList.remove('hidden');

            let innerHTML = `
                <div class="space-y-8">
                    <h2 class="text-6xl md:text-8xl font-black italic uppercase tracking-tighter" style="color: ${studio.color}">${studio.id.toUpperCase()}_STUDIO</h2>
                    <p class="text-xl text-slate-400 font-medium">${studio.desc}</p>
                    
                    <div class="bg-white/5 p-10 rounded-[40px] border border-white/10">
                        <div id="dropZone" class="border-2 border-dashed border-white/20 rounded-3xl p-16 text-center cursor-pointer hover:border-white transition">
                            <i class="fas fa-upload text-4xl mb-4 text-slate-600"></i>
                            <p class="font-bold text-slate-400">Upload Assets to Studio</p>
                            <input type="file" id="fileIn" class="hidden">
                        </div>
                        <textarea id="textIn" class="hidden w-full mt-6 bg-transparent border border-white/10 rounded-2xl p-6 text-white outline-none focus:border-white" rows="4" placeholder="Enter data..."></textarea>
                        <button id="actionBtn" class="w-full mt-10 btn-premium py-6 rounded-3xl font-black text-2xl uppercase tracking-tighter">Run Studio Engine</button>
                    </div>
                </div>
                <div class="flex flex-col items-center">
                    <div id="studioPreview" class="w-full aspect-square bg-black/40 rounded-[60px] border border-white/5 flex flex-col items-center justify-center p-10 text-center">
                        <i class="fas ${studio.icon} text-8xl text-slate-900 mb-6"></i>
                        <p class="text-slate-700 font-black uppercase tracking-widest text-xs">Studio Output Monitor</p>
                    </div>
                    <a id="dl" class="hidden mt-8 w-full bg-white text-black py-6 rounded-3xl font-black text-center text-xl uppercase tracking-tighter">Download Result</a>
                </div>
            `;

            container.innerHTML = innerHTML;

            // Simple Logic for the Engine
            const up = document.getElementById('dropZone');
            const txt = document.getElementById('textIn');
            if(id === 'yt' || id === 'sec') { up.classList.add('hidden'); txt.classList.remove('hidden'); }

            document.getElementById('actionBtn').onclick = () => {
                const preview = document.getElementById('studioPreview');
                preview.innerHTML = `<div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-white"></div><p class="mt-6 font-bold uppercase tracking-widest text-xs">Studio Engine Processing...</p>`;
                
                setTimeout(() => {
                    if(id === 'sec') {
                        const p = Math.random().toString(36).slice(-10).toUpperCase();
                        preview.innerHTML = `<h1 class="text-5xl font-black text-brand-orange font-mono">${p}</h1>`;
                    } else if(id === 'yt') {
                        preview.innerHTML = `<div class="text-left w-full"><p class="text-red-500 font-bold">#Viral #Growth #Trends</p></div>`;
                    } else {
                        preview.innerHTML = `<i class="fas fa-check-circle text-8xl text-green-500"></i><p class="mt-6 font-black uppercase">Process Complete!</p>`;
                    }
                }, 1500);
            };
        }

        function closeStudio() {
            document.getElementById('studioWorkspace').classList.add('hidden');
        }

        renderHub();
    </script>
</body>
</html>
